version: 2
updates:
  # GitHub Actions referenced from workflows (.github/workflows) and from every
  # composite action.yml in the repo.
  - package-ecosystem: github-actions
    directories: ["/**"]
    # deprecated/ holds retired actions + disabled workflows — not maintained.
    exclude-paths: ["deprecated/**"]
    schedule:
      interval: weekly
    groups:
      actions:
        # group-by dependency-name collapses the same action bump across every
        # directory it appears in into ONE pull request, instead of Dependabot's
        # default of one grouped PR per directory.
        group-by: dependency-name
        patterns:
          - "*"

  # Bundled Node actions: every directory with a package.json. group-by
  # dependency-name consolidates a given package bump across all action folders
  # into a single PR. Minor + patch are grouped; majors still arrive separately
  # (one PR per package) so each can be canary-tested.
  - package-ecosystem: npm
    directories:
      - "/*"
    # deprecated/ node actions are not maintained.
    exclude-paths:
      - "deprecated/**"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        group-by: dependency-name
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        group-by: dependency-name
        patterns:
          - "*"
        update-types:
          - "major"
