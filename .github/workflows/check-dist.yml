name: check-dist

# Verifies that each Node action's committed dist/ matches what ncc would
# emit from its current src/ + package-lock.json. Fails the PR if the bundle
# is stale, so contributors cannot ship a src/ change without rebuilding.

on:
  pull_request:
    paths:
      - "*/src/**"
      - "*/index.js"        # actions like changelog-generator that bundle a root index.js
      - "*/package.json"
      - "*/package-lock.json"
      - "*/tsconfig.json"
      - ".github/workflows/check-dist.yml"

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      actions: ${{ steps.changed.outputs.actions }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: changed
        name: List action directories with relevant changes
        run: |
          dirs=$(git diff --name-only \
            "origin/${{ github.base_ref }}...HEAD" \
            -- '*/src/**' '*/index.js' '*/package.json' '*/package-lock.json' '*/tsconfig.json' \
            | awk -F/ '$1 != "" && $1 != ".github" {print $1}' \
            | sort -u \
            | jq -R . | jq -sc .)
          echo "actions=$dirs" >> "$GITHUB_OUTPUT"
          echo "Detected: $dirs"

  build-and-diff:
    needs: detect
    if: needs.detect.outputs.actions != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action: ${{ fromJson(needs.detect.outputs.actions) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.action }}/package-lock.json

      - name: Skip actions without a build script
        id: gate
        working-directory: ${{ matrix.action }}
        run: |
          if [ ! -f package.json ] || ! jq -e '.scripts.build' package.json >/dev/null; then
            echo "No build script in ${{ matrix.action }}; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ matrix.action }}
        run: npm ci --no-audit --no-fund

      - name: Rebuild dist/
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ matrix.action }}
        run: npm run build

      - name: Smoke-load the bundle
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ matrix.action }}
        run: |
          node --check dist/index.js
          # require() runs the entry point. Most actions immediately call
          # core.getInput / fail-fast on missing env. We tolerate that exit
          # path; we only want to catch ReferenceError / module-not-found.
          node -e "require('./dist/index.js')" || true

      - name: Verify committed dist/ matches rebuild
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ matrix.action }}
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ in ${{ matrix.action }} is stale. Run 'npm ci && npm run build' inside that directory and commit the result."
            git --no-pager diff --stat -- dist/
            exit 1
          fi
